<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0A0A14" />
    <meta name="description" content="NetWave Hotspot — Fast, Affordable Wi-Fi Access" />
    <title>NetWave Hotspot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: 'Inter','Segoe UI',sans-serif; -webkit-font-smoothing: antialiased; background: #0A0A14; }

      ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
